apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: locadora

spec:
  replicas: 2

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres
        image: postgres:16

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: projeto

        - name: POSTGRES_USER
          value: appuser

        - name: POSTGRES_PASSWORD
          value: appuser